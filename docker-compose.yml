services:
  postgres:
    image: postgres:16-alpine
    container_name: frentry-postgres
    restart: unless-stopped
    ports:
      - "55003:5432"
    environment:
      POSTGRES_USER: frentry
      POSTGRES_PASSWORD: frentry_password
      POSTGRES_DB: frentry
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U frentry"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
    driver: local
